<fieldset
  utrecht-fieldset
  [disabled]="disabled"
  [invalid]="invalid"
  [attr.aria-label]="ariaLabel || null"
  [attr.aria-labelledby]="ariaLabelledby || null"
  [attr.aria-describedby]="ariaDescribedBy || null"
  [attr.aria-invalid]="invalid ? 'true' : null"
  ><ng-content></ng-content
></fieldset>
